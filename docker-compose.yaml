version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - panel_data:/app/data
      - panel_uploads:/app/uploads
    environment:
      - PORT=${PORT:-3001}
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/app/data/database.sqlite
    restart: always

volumes:
  panel_data:
  panel_uploads:
